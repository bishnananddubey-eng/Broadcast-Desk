package com.broadcastdesk.service

import android.app.*
import android.content.Context
import android.content.Intent
import android.content.pm.ServiceInfo
import android.hardware.display.DisplayManager
import android.hardware.display.VirtualDisplay
import android.media.MediaRecorder
import android.media.projection.MediaProjection
import android.media.projection.MediaProjectionManager
import android.os.Build
import android.os.Environment
import android.os.Handler
import android.os.IBinder
import android.os.Looper
import android.util.DisplayMetrics
import androidx.core.app.NotificationCompat
import com.broadcastdesk.RecorderState
import java.io.File
import java.text.SimpleDateFormat
import java.util.*

/**
 * Screen capture + encoding.
 *
 * Design note: rather than compositing camera frames into the video pixel-by-pixel
 * (which needs a hand-rolled OpenGL pipeline), the camera is shown as a real floating
 * window (see CameraOverlayService). MediaProjection captures the whole display, so the
 * floating camera bubble is simply part of what gets recorded — same trick used by most
 * screen-recorder-with-facecam apps on the Play Store.
 */
class ScreenRecordService : Service() {

    companion object {
        const val CHANNEL_ID = "screen_record_channel"
        const val NOTIF_ID = 1001
        const val ACTION_START = "com.broadcastdesk.action.START_SCREEN"
        const val ACTION_STOP = "com.broadcastdesk.action.STOP_SCREEN"
        const val EXTRA_RESULT_CODE = "resultCode"
        const val EXTRA_RESULT_DATA = "resultData"
        const val EXTRA_WITH_MIC = "withMic"
    }

    private var mediaProjection: MediaProjection? = null
    private var virtualDisplay: VirtualDisplay? = null
    private var mediaRecorder: MediaRecorder? = null
    private val handler = Handler(Looper.getMainLooper())
    private var startTime = 0L
    private var outputFile: File? = null

    private val timerRunnable = object : Runnable {
        override fun run() {
            if (RecorderState.isScreenRecording.value) {
                RecorderState.elapsedMs.value = System.currentTimeMillis() - startTime
                handler.postDelayed(this, 250)
            }
        }
    }

    override fun onBind(intent: Intent?): IBinder? = null

    override fun onStartCommand(intent: Intent?, flags: Int, startId: Int): Int {
        when (intent?.action) {
            ACTION_START -> {
                val resultCode = intent.getIntExtra(EXTRA_RESULT_CODE, Activity_RESULT_CANCELED)
                val resultData: Intent? = intent.getParcelableExtra(EXTRA_RESULT_DATA)
                val withMic = intent.getBooleanExtra(EXTRA_WITH_MIC, false)
                if (resultData != null && resultCode == Activity.RESULT_OK) {
                    startForegroundNotification()
                    beginRecording(resultCode, resultData, withMic)
                } else {
                    RecorderState.announce("Screen capture permission was not granted")
                    stopSelf()
                }
            }
            ACTION_STOP -> {
                stopRecording()
                stopSelf()
            }
        }
        return START_NOT_STICKY
    }

    private fun startForegroundNotification() {
        val manager = getSystemService(NotificationManager::class.java)
        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
            val channel = NotificationChannel(
                CHANNEL_ID, "Screen recording", NotificationManager.IMPORTANCE_LOW
            )
            manager.createNotificationChannel(channel)
        }
        val notification = NotificationCompat.Builder(this, CHANNEL_ID)
            .setContentTitle("Broadcast Desk is recording")
            .setContentText("Tap to return to the app")
            .setSmallIcon(android.R.drawable.presence_video_online)
            .setOngoing(true)
            .build()

        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
            startForeground(
                NOTIF_ID, notification,
                ServiceInfo.FOREGROUND_SERVICE_TYPE_MEDIA_PROJECTION
            )
        } else {
            startForeground(NOTIF_ID, notification)
        }
    }

    private fun beginRecording(resultCode: Int, resultData: Intent, withMic: Boolean) {
        val projectionManager =
            getSystemService(Context.MEDIA_PROJECTION_SERVICE) as MediaProjectionManager
        mediaProjection = projectionManager.getMediaProjection(resultCode, resultData)

        val (width, height, density) = WindowManager_Compat().screenSpecs(this)

        val moviesDir = getExternalFilesDir(Environment.DIRECTORY_MOVIES) ?: filesDir
        val name = "broadcast-desk-" +
            SimpleDateFormat("yyyy-MM-dd-HHmmss", Locale.US).format(Date()) + ".mp4"
        outputFile = File(moviesDir, name)

        mediaRecorder = MediaRecorder().apply {
            if (withMic) {
                setAudioSource(MediaRecorder.AudioSource.MIC)
            }
            setVideoSource(MediaRecorder.VideoSource.SURFACE)
            setOutputFormat(MediaRecorder.OutputFormat.MPEG_4)
            if (withMic) {
                setAudioEncoder(MediaRecorder.AudioEncoder.AAC)
                setAudioEncodingBitRate(128_000)
                setAudioSamplingRate(44_100)
            }
            setVideoEncoder(MediaRecorder.VideoEncoder.H264)
            setVideoSize(width, height)
            setVideoEncodingBitRate(8_000_000)
            setVideoFrameRate(30)
            setOutputFile(outputFile!!.absolutePath)
            prepare()
        }

        virtualDisplay = mediaProjection?.createVirtualDisplay(
            "BroadcastDeskCapture",
            width, height, density,
            DisplayManager.VIRTUAL_DISPLAY_FLAG_AUTO_MIRROR,
            mediaRecorder!!.surface,
            null, handler
        )

        mediaProjection?.registerCallback(object : MediaProjection.Callback() {
            override fun onStop() {
                stopRecording()
            }
        }, handler)

        mediaRecorder?.start()
        startTime = System.currentTimeMillis()
        RecorderState.isScreenRecording.value = true
        RecorderState.announce("Recording started")
        handler.post(timerRunnable)
    }

    private fun stopRecording() {
        if (!RecorderState.isScreenRecording.value) return
        try {
            mediaRecorder?.stop()
        } catch (e: Exception) {
            // stop() throws if called too soon after start(); the partial file is still usable.
        }
        mediaRecorder?.reset()
        mediaRecorder?.release()
        mediaRecorder = null

        virtualDisplay?.release()
        virtualDisplay = null
        mediaProjection?.stop()
        mediaProjection = null

        RecorderState.isScreenRecording.value = false
        RecorderState.lastRecordingPath.value = outputFile?.absolutePath
        RecorderState.announce(
            "Recording stopped. Saved to Movies as " + (outputFile?.name ?: "recording")
        )
        stopForeground(STOP_FOREGROUND_REMOVE)
    }

    override fun onDestroy() {
        stopRecording()
        super.onDestroy()
    }
}

// Small helpers kept local to this file so it stays self-contained.
private const val Activity_RESULT_CANCELED = Activity.RESULT_CANCELED

private class WindowManager_Compat {
    fun screenSpecs(service: Service): Triple<Int, Int, Int> {
        val wm = service.getSystemService(Context.WINDOW_SERVICE) as WindowManager
        val metrics = DisplayMetrics()
        @Suppress("DEPRECATION")
        wm.defaultDisplay.getRealMetrics(metrics)
        return Triple(metrics.widthPixels, metrics.heightPixels, metrics.densityDpi)
    }
}

private typealias WindowManager = android.view.WindowManager
private typealias Activity = android.app.Activity
