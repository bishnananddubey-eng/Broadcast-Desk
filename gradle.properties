package com.broadcastdesk.service

import android.graphics.drawable.GradientDrawable

object RoundedCameraBubbleBackground {
    fun create(): GradientDrawable = GradientDrawable().apply {
        shape = GradientDrawable.OVAL
        setColor(0xFF12161D.toInt())
        setStroke(6, 0xFFE0A83F.toInt())
    }
}
